services:
  - type: web
    name: guided-capture-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      # Render's fromService/host blueprint property returns the bare
      # service name, not the full onrender.com hostname -- hardcoded here
      # to the actual assigned URL instead.
      - key: ALLOWED_ORIGIN
        value: https://guided-capture-web.onrender.com

  - type: web
    name: guided-capture-web
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://guided-capture-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
