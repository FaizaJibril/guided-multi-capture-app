services:
  - type: web
    name: guided-capture-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGIN
        fromService:
          type: web
          name: guided-capture-web
          property: host

  - type: web
    name: guided-capture-web
    runtime: static
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: guided-capture-api
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
